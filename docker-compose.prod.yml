x-backend-common: &backend-common
  build:
    context: ./backend
    target: prod
  env_file: .env.prod
  restart: unless-stopped
  networks:
    - internal
  depends_on:
    db:
      condition: service_healthy
    redis:
      condition: service_healthy

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-bresler_erp}
      POSTGRES_USER: ${POSTGRES_USER:-bresler}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-bresler}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - internal

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - internal

  backend:
    <<: *backend-common
    command: gunicorn
    volumes:
      - static_files:/app/staticfiles
      - media_files:/app/media

  daphne:
    <<: *backend-common
    command: daphne

  celery-worker:
    <<: *backend-common
    command: celery-worker

  celery-beat:
    <<: *backend-common
    command: celery-beat

  nginx:
    build:
      context: .
      dockerfile: docker/nginx/Dockerfile.prod
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - static_files:/var/www/static:ro
      - media_files:/var/www/media:ro
      - ./docker/nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
      - daphne
    restart: unless-stopped
    networks:
      - internal

volumes:
  postgres_data:
  static_files:
  media_files:

networks:
  internal:
